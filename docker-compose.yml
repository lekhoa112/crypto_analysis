services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-analysis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_analysis
    ports:
      - "5432:5432"
    volumes:
      - crypto_analysis_pg:/var/lib/postgresql/data

volumes:
  crypto_analysis_pg:
